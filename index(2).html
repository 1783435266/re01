<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>葫芦岛北所积分一览</title>
    <!-- Inter 字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0B1A33;
            color: #E9ECF2;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
            line-height: 1.5;
        }

        /* 主卡片 */
        .dashboard {
            max-width: 1400px;
            width: 100%;
            background: rgba(16, 30, 56, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 36px;
            box-shadow: 0 25px 50px -10px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.04) inset;
            padding: 2.5rem 2.2rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        /* 登录卡片专属样式 */
        .login-container {
            max-width: 480px;
            margin: 0 auto;
            padding: 1rem 0 2rem 0;
        }

        .login-card {
            background: rgba(5, 15, 30, 0.8);
            border-radius: 48px;
            padding: 2.8rem 2.5rem;
            border: 1px solid #2a4a78;
            box-shadow: 0 30px 45px -20px #010613;
            backdrop-filter: blur(8px);
        }

        .login-title {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-title h1 {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #f5f9ff, #b3d0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .login-sub {
            color: #8fb4e0;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .input-field {
            margin-bottom: 1.8rem;
        }

        .input-field label {
            display: block;
            color: #BFD5F2;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
        }

        .input-field select, .input-field input {
            width: 100%;
            padding: 1rem 1.5rem;
            background: #10233f;
            border: 1px solid #2b4c7c;
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.15s;
        }

        .input-field select:focus, .input-field input:focus {
            border-color: #6b9fd1;
            box-shadow: 0 0 0 3px rgba(107, 159, 209, 0.3);
        }

        .login-btn {
            width: 100%;
            background: #204f7a;
            border: 1px solid #4583b9;
            border-radius: 40px;
            padding: 1rem;
            font-weight: 600;
            font-size: 1.1rem;
            color: white;
            cursor: pointer;
            transition: 0.15s;
            margin-top: 0.5rem;
            letter-spacing: 0.5px;
        }

        .login-btn:hover {
            background: #265f92;
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -8px #020a18;
        }

        .footer-note {
            margin-top: 1.5rem;
            text-align: center;
            color: #47658b;
            font-size: 0.85rem;
        }

        /* 头部样式 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .title-section h1 {
            font-weight: 600;
            font-size: 1.9rem;
            background: linear-gradient(135deg, #F0F5FA, #C6D9F0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .badge {
            background: rgba(74, 118, 168, 0.3);
            border-radius: 100px;
            padding: 0.2rem 1rem;
            font-size: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: inline-block;
            color: #B6D0E8;
        }

        .user-info {
            background: #23457a;
            border-radius: 60px;
            padding: 0.5rem 1.8rem;
            font-weight: 600;
            border: 1px solid #3b6c9f;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logout-btn {
            background: transparent;
            border: 1px solid #6b8fb0;
            border-radius: 40px;
            padding: 0.3rem 1.2rem;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.1s;
        }
        .logout-btn:hover {
            background: #1f4168;
        }

        /* 加分项面板 + 保存按钮 */
        .criteria-panel {
            background: rgba(5, 15, 30, 0.6);
            border-radius: 28px;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            border: 1px solid #25477a;
        }
        .criteria-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            color: #b3cef0;
        }
        .save-all-btn {
            background: #1b5a3c;
            border: 1px solid #3b9b6b;
            border-radius: 40px;
            padding: 0.6rem 2rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.15s;
        }
        .save-all-btn:hover {
            background: #247b50;
            border-color: #5fcb92;
            transform: scale(1.02);
        }
        .criteria-list {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem 2rem;
            align-items: center;
        }
        .criterion-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: #102542;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            border: 1px solid #2f5582;
        }
        .criterion-item input {
            background: #1a3458;
            border: 1px solid #3c6190;
            border-radius: 30px;
            padding: 0.4rem 1rem;
            width: 140px;
            color: white;
        }
        .criterion-item input:focus {
            outline: none;
            border-color: #88b8f0;
        }
        .edit-actions {
            display: flex;
            gap: 0.3rem;
        }
        .icon-btn {
            background: #203c60;
            border: 1px solid #3f6fa0;
            border-radius: 30px;
            width: 34px;
            height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: 0.1s;
        }
        .icon-btn.danger:hover {
            background: #8b3a4c;
            border-color: #c1556b;
        }

        /* 表格 */
        .table-section {
            background: rgba(0, 8, 20, 0.4);
            border-radius: 32px;
            padding: 1.8rem 1.5rem;
            border: 1px solid #25426b;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        th {
            text-align: left;
            padding: 1rem 0.8rem;
            background: #10243f;
            color: #c0d6f0;
            font-weight: 500;
            border-bottom: 2px solid #2a4c7a;
        }
        td {
            padding: 0.9rem 0.8rem;
            border-bottom: 1px solid #1e3a60;
        }
        .member-name {
            font-weight: 600;
            color: #f0f6ff;
        }
        .point-input-cell {
            background: #0d203b;
            border-radius: 30px;
            padding: 0.3rem 0.3rem;
            display: flex;
            align-items: center;
            max-width: 120px;
            border: 1px solid #2d5582;
        }
        .point-input-cell input {
            width: 60px;
            background: transparent;
            border: none;
            color: white;
            font-weight: 600;
            text-align: center;
            outline: none;
        }
        .point-input-cell button {
            background: #203f69;
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            border: 1px solid #3e72aa;
        }
        .total-col {
            font-weight: 700;
            color: #FFE484;
            font-size: 1.1rem;
        }
        .member-only-note {
            background: #1e3b5c;
            border-radius: 40px;
            padding: 1rem 2rem;
            text-align: center;
            border: 1px solid #7099cc;
        }
        .hidden {
            display: none !important;
        }
        /* 移除 spinner */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            opacity: 0.3;
        }
    </style>
</head>
<body>
<div class="dashboard" id="app"></div>

<script>
    (function() {
        // ---------- 模拟后端数据库 (统一数据源) ----------
        const USERS_DB = {
            "admin": { name: "管理员", password: "admin123", role: "admin" },
            "孙兴亚": { name: "孙兴亚", password: "member123", role: "member" },
            "王宗英": { name: "王宗英", password: "member123", role: "member" },
            "李嘉宾": { name: "李嘉宾", password: "member123", role: "member" },
            "李长孝": { name: "李长孝", password: "member123", role: "member" },
            "李秀研": { name: "李秀研", password: "member123", role: "member" },
            "钟伟": { name: "钟伟", password: "member123", role: "member" },
            "杨盛迪": { name: "杨盛迪", password: "member123", role: "member" },
            "张靖浩": { name: "张靖浩", password: "member123", role: "member" },
            "戴湃": { name: "戴湃", password: "member123", role: "member" },
            "秦睿哲": { name: "秦睿哲", password: "member123", role: "member" },
            "房磊": { name: "房磊", password: "member123", role: "member" },
            "李逊": { name: "李逊", password: "member123", role: "member" },
            "刘迪": { name: "刘迪", password: "member123", role: "member" },
            "李欣洋": { name: "李欣洋", password: "member123", role: "member" },
            "张贺": { name: "张贺", password: "member123", role: "member" },
            "丛龙源": { name: "丛龙源", password: "member123", role: "member" },
            "邓茗哲": { name: "邓茗哲", password: "member123", role: "member" },
            "黎宝龙": { name: "黎宝龙", password: "member123", role: "member" },
            "李岱恒": { name: "李岱恒", password: "member123", role: "member" },
            "马铭军": { name: "马铭军", password: "member123", role: "member" },
            "李慎夫": { name: "李慎夫", password: "member123", role: "member" },
            "陈禹澎": { name: "陈禹澎", password: "member123", role: "member" }
        };

        const MEMBER_NAMES = Object.keys(USERS_DB).filter(name => name !== 'admin');

        // ---------- 全局唯一积分数据库 (实时存储最新已保存数据) ----------
        let CRITERIA_DB = [
            { id: 'c1', name: '办案贡献', points: {} },
            { id: 'c2', name: '日常表现', points: {} },
            { id: 'c3', name: '参加活动', points: {} }
        ];

        // 初始化积分0
        function initDBPoints() {
            CRITERIA_DB.forEach(c => {
                MEMBER_NAMES.forEach(m => { c.points[m] = 0; });
                c.points['admin'] = 0;
            });
        }
        initDBPoints();

        // ---------- 工作副本 (管理员编辑时暂存，保存后写入DB) ----------
        let workingCriteria = JSON.parse(JSON.stringify(CRITERIA_DB)); // deep copy

        // 当前登录用户
        let currentUser = null;
        let isLoggedIn = false;

        const app = document.getElementById('app');

        // 渲染入口
        function render() {
            if (!isLoggedIn || !currentUser) {
                renderLogin();
            } else {
                renderDashboard();
            }
        }

        // ---------- 登录页面 (移除密码提示，标题改为"葫芦岛北所积分一览") ----------
        function renderLogin() {
            app.innerHTML = `
                <div class="login-container">
                    <div class="login-card">
                        <div class="login-title">
                            <h1>⚓ 葫芦岛北所</h1>
                            <div class="login-sub">
                                <i class="fas fa-chart-line"></i> 积分一览
                                <i class="fas fa-shield" style="margin-left: 8px;"></i>
                            </div>
                        </div>
                        <div class="input-field">
                            <label><i class="far fa-user"></i> 选择身份</label>
                            <select id="loginUser">
                                <option value="admin">管理员 (我)</option>
                                ${MEMBER_NAMES.map(name => `<option value="${name}">${name}</option>`).join('')}
                            </select>
                        </div>
                        <div class="input-field">
                            <label><i class="fas fa-lock"></i> 密码</label>
                            <input type="password" id="loginPassword" placeholder="">
                        </div>
                        <button class="login-btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> 登录</button>
                        <div class="footer-note">
                            <i class="far fa-eye"></i> 管理员可编辑 · 成员仅查看
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('loginBtn').addEventListener('click', () => {
                const username = document.getElementById('loginUser').value;
                const pwd = document.getElementById('loginPassword').value;
                const userRecord = USERS_DB[username];
                if (userRecord && userRecord.password === pwd) {
                    currentUser = { name: userRecord.name, role: userRecord.role };
                    isLoggedIn = true;
                    // 登录时，将工作副本重置为当前已保存的数据库
                    workingCriteria = JSON.parse(JSON.stringify(CRITERIA_DB));
                    render();
                } else {
                    alert('密码错误 (管理员: admin123 / 成员: member123)');
                }
            });
        }

        // ---------- 主仪表盘 ----------
        function renderDashboard() {
            const isAdmin = currentUser.role === 'admin';

            // 计算某成员总分 (基于工作副本，实时展示草稿)
            function computeTotal(memberName) {
                return workingCriteria.reduce((sum, c) => sum + (c.points[memberName] || 0), 0);
            }

            // 保存所有变更: 将 workingCriteria 写回 CRITERIA_DB
            function saveAllChanges() {
                if (!isAdmin) return;
                CRITERIA_DB = JSON.parse(JSON.stringify(workingCriteria));
                alert('✅ 积分及加分项已保存到公共数据库');
                render(); // 刷新 (按钮文字可变化，简单重绘)
            }

            // 增加/减少 (仅修改工作副本)
            function changePoint(memberName, criterionId, delta) {
                if (!isAdmin) return;
                const criterion = workingCriteria.find(c => c.id === criterionId);
                if (criterion) {
                    const current = criterion.points[memberName] || 0;
                    const newVal = current + delta;
                    if (newVal >= 0) {
                        criterion.points[memberName] = newVal;
                    }
                }
                render(); // 刷新界面展示最新草稿
            }

            // 更新加分项名称 (工作副本)
            function updateCriterionName(id, newName) {
                const crit = workingCriteria.find(c => c.id === id);
                if (crit) crit.name = newName || '未命名';
                render();
            }

            // 删除加分项 (工作副本)
            function deleteCriterion(id) {
                if (!isAdmin) return;
                const index = workingCriteria.findIndex(c => c.id === id);
                if (index !== -1) workingCriteria.splice(index, 1);
                render();
            }

            // 新增加分项 (工作副本)
            function addCriterion() {
                if (!isAdmin) return;
                const newId = 'c' + Date.now() + Math.random().toString(36).substr(2, 4);
                const newCriterion = { id: newId, name: '新加分项', points: {} };
                MEMBER_NAMES.forEach(m => newCriterion.points[m] = 0);
                newCriterion.points['admin'] = 0;
                workingCriteria.push(newCriterion);
                render();
            }

            // 渲染主界面
            app.innerHTML = `
                <div>
                    <!-- 头部 -->
                    <div class="header">
                        <div class="title-section">
                            <h1><i class="fas fa-crown" style="color: #f2c94c;"></i> 葫芦岛北所 · 积分管理</h1>
                            <div class="badge">${isAdmin ? '管理员 · 编辑草稿 (保存后生效)' : '成员 · 实时查看'}</div>
                        </div>
                        <div class="user-info">
                            <i class="fas fa-user-circle"></i> ${currentUser.name} (${currentUser.role === 'admin' ? '我' : '成员'})
                            <span class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> 退出</span>
                        </div>
                    </div>

                    <!-- 加分项编辑面板 + 保存按钮 (仅管理员) -->
                    <div class="criteria-panel ${isAdmin ? '' : 'hidden'}">
                        <div class="criteria-header">
                            <span><i class="fas fa-pen-to-square"></i> 编辑加分项 (名称 / 新增 / 删除) </span>
                            <span class="save-all-btn" id="saveAllBtn"><i class="fas fa-save"></i> 保存变更</span>
                        </div>
                        <div class="criteria-list" id="criteriaList">
                            ${workingCriteria.map(c => `
                                <div class="criterion-item">
                                    <input type="text" value="${c.name}" placeholder="项名称" data-id="${c.id}" class="criteria-name-input">
                                    <div class="edit-actions">
                                        <span class="icon-btn" data-id="${c.id}" data-action="save"><i class="fas fa-check"></i></span>
                                        <span class="icon-btn danger" data-id="${c.id}" data-action="delete"><i class="fas fa-trash"></i></span>
                                    </div>
                                </div>
                            `).join('')}
                            <span class="icon-btn" id="addCriterionBtn" style="width:auto; padding:0 1.5rem;"><i class="fas fa-plus"></i> 新增项</span>
                        </div>
                    </div>

                    <!-- 积分明细表格 (基于工作副本显示) -->
                    <div class="table-section">
                        <div class="table-header">
                            <h3><i class="fas fa-table"></i> 成员积分明细 ${!isAdmin ? '(只读)' : '(草稿)'}</h3>
                            <span>${MEMBER_NAMES.length} 名成员</span>
                        </div>
                        <table>
                            <thead>
                                <tr>
                                    <th>成员姓名</th>
                                    ${workingCriteria.map(c => `<th>${c.name}</th>`).join('')}
                                    <th>总分</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${MEMBER_NAMES.map(member => {
                                    return `
                                        <tr>
                                            <td class="member-name">${member}</td>
                                            ${workingCriteria.map(c => {
                                                const pointVal = c.points[member] || 0;
                                                if (isAdmin) {
                                                    return `
                                                        <td>
                                                            <div class="point-input-cell">
                                                                <button data-member="${member}" data-criteria="${c.id}" data-delta="-1">−</button>
                                                                <input type="number" value="${pointVal}" min="0" readonly data-member="${member}" data-criteria="${c.id}">
                                                                <button data-member="${member}" data-criteria="${c.id}" data-delta="1">+</button>
                                                            </div>
                                                        </td>
                                                    `;
                                                } else {
                                                    return `<td style="font-weight:500;">${pointVal}</td>`;
                                                }
                                            }).join('')}
                                            <td class="total-col">${computeTotal(member)}</td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>

                        ${!isAdmin ? `
                            <div class="member-only-note" style="margin-top:2rem;">
                                <i class="fas fa-eye"></i> 您正在以成员身份查看，当前数据为已保存的公共积分。
                            </div>
                        ` : ''}
                    </div>
                    <div class="footer-note" style="text-align:right;">
                        <i class="far fa-clock"></i>  ${isAdmin ? '编辑后记得点击保存变更' : '数据实时来自公共库'}
                    </div>
                </div>
            `;

            // 登出
            document.getElementById('logoutBtn')?.addEventListener('click', () => {
                isLoggedIn = false;
                currentUser = null;
                render();
            });

            if (isAdmin) {
                // 积分加减事件 (工作副本)
                document.querySelectorAll('.point-input-cell button').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const member = btn.dataset.member;
                        const criteriaId = btn.dataset.criteria;
                        const delta = parseInt(btn.dataset.delta, 10);
                        changePoint(member, criteriaId, delta);
                    });
                });

                // 保存所有变更按钮
                document.getElementById('saveAllBtn')?.addEventListener('click', saveAllChanges);

                // 更新加分项名称 (打勾按钮)
                document.querySelectorAll('[data-action="save"]').forEach(saveBtn => {
                    saveBtn.addEventListener('click', (e) => {
                        const id = saveBtn.dataset.id;
                        const input = document.querySelector(`.criteria-name-input[data-id="${id}"]`);
                        if (input) updateCriterionName(id, input.value);
                    });
                });
                // 删除
                document.querySelectorAll('[data-action="delete"]').forEach(delBtn => {
                    delBtn.addEventListener('click', (e) => {
                        const id = delBtn.dataset.id;
                        if (workingCriteria.length <= 1) {
                            alert('至少保留一个加分项');
                            return;
                        }
                        if (confirm('确定删除该项吗？')) deleteCriterion(id);
                    });
                });
                // 新增
                document.getElementById('addCriterionBtn')?.addEventListener('click', addCriterion);
            }
        }

        // 启动
        render();
    })();
</script>
</body>
</html>
